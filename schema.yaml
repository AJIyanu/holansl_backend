openapi: 3.0.3
info:
  title: HolanSL Admin Dashboard API
  version: 1.0.0
  description: Holan Integrated Services Ltd Administrative
paths:
  /account/audit-logs/:
    get:
      operationId: account_audit_logs_list
      parameters:
      - in: query
        name: action
        schema:
          type: string
      - in: query
        name: app_label
        schema:
          type: string
      - in: query
        name: event_category
        schema:
          type: string
          enum:
          - AUTH
          - CRUD
          - SECURITY
          - SYSTEM
        description: |-
          * `AUTH` - Authentication
          * `CRUD` - CRUD Activity
          * `SYSTEM` - System
          * `SECURITY` - Security
      - in: query
        name: event_type
        schema:
          type: string
          enum:
          - ACCOUNT_CREATED
          - CREATE
          - DEFAULT_PASSWORD_LOGIN_BLOCKED
          - DELETE
          - LOGIN_FAILED
          - LOGIN_SUCCESS
          - LOGOUT
          - PASSWORD_RESET_CODE_VERIFIED
          - PASSWORD_RESET_COMPLETED
          - PASSWORD_RESET_EMAIL_FAILED
          - PASSWORD_RESET_FAILED
          - PASSWORD_RESET_LINK_SENT
          - PASSWORD_RESET_REQUESTED
          - READ
          - UPDATE
        description: |-
          * `LOGIN_SUCCESS` - Login Success
          * `LOGIN_FAILED` - Login Failed
          * `LOGOUT` - Logout
          * `ACCOUNT_CREATED` - Account Created
          * `DEFAULT_PASSWORD_LOGIN_BLOCKED` - Default Password Login Blocked
          * `PASSWORD_RESET_LINK_SENT` - Password Reset Link Sent
          * `PASSWORD_RESET_CODE_VERIFIED` - Password Reset Code Verified
          * `PASSWORD_RESET_COMPLETED` - Password Reset Completed
          * `PASSWORD_RESET_FAILED` - Password Reset Failed
          * `PASSWORD_RESET_REQUESTED` - Password Reset Requested
          * `PASSWORD_RESET_EMAIL_FAILED` - Password Reset Email Failed
          * `CREATE` - Create
          * `READ` - Read
          * `UPDATE` - Update
          * `DELETE` - Delete
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: resource
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - FAILED
          - SUCCESS
        description: |-
          * `SUCCESS` - Success
          * `FAILED` - Failed
      - in: query
        name: target_user
        schema:
          type: string
          format: uuid
      - in: query
        name: user
        schema:
          type: string
          format: uuid
      tags:
      - account
      security:
      - cookieAuth: []
      - tokenAuth: []
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditLogList'
          description: ''
