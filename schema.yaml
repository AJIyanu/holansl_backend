components:
  schemas:
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/AuditUserSummary'
          readOnly: true
        target_user:
          allOf:
          - $ref: '#/components/schemas/AuditUserSummary'
          readOnly: true
        event_category:
          allOf:
          - $ref: '#/components/schemas/EventCategoryEnum'
          readOnly: true
        event_type:
          allOf:
          - $ref: '#/components/schemas/EventTypeEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/AuditLogStatusEnum'
          readOnly: true
        username_attempted:
          type: string
          readOnly: true
          description: Username/email submitted during login attempt.
        app_label:
          type: string
          readOnly: true
        resource:
          type: string
          readOnly: true
        action:
          type: string
          readOnly: true
        object_id:
          type: string
          readOnly: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        user_agent:
          type: string
          readOnly: true
        metadata:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - app_label
      - created_at
      - event_category
      - event_type
      - id
      - ip_address
      - metadata
      - object_id
      - resource
      - status
      - target_user
      - user
      - user_agent
      - username_attempted
    AuditLogStatusEnum:
      enum:
      - SUCCESS
      - FAILED
      type: string
      description: |-
        * `SUCCESS` - Success
        * `FAILED` - Failed
    AuditUserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
      required:
      - email
      - id
      - username
    BlankEnum:
      enum:
      - ''
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        flow:
          $ref: '#/components/schemas/FlowEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - flow
      - id
      - name
      - updated_at
    ChannelEnum:
      enum:
      - DASHBOARD
      - EMAIL
      - WHATSAPP
      type: string
      description: |-
        * `DASHBOARD` - Dashboard
        * `EMAIL` - Email
        * `WHATSAPP` - WhatsApp
    ChannelsEnum:
      enum:
      - DASHBOARD
      - EMAIL
      - WHATSAPP
      type: string
      description: |-
        * `DASHBOARD` - Dashboard
        * `EMAIL` - Email
        * `WHATSAPP` - WhatsApp
    ClientRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        client_name:
          type: string
          readOnly: true
        supplier_quotes:
          type: array
          items:
            $ref: '#/components/schemas/SupplierQuote'
          readOnly: true
        contact_person_name:
          type: string
          readOnly: true
        item_name:
          type: string
          maxLength: 255
        specification:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
          maxLength: 100
        brand:
          type: string
          nullable: true
          maxLength: 100
        uom:
          type: string
          maxLength: 50
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        status:
